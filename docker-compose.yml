services:
  # Laravel API (PHP) + Vue.js (Node.js)
  app:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    container_name: task-board-app
    working_dir: /workspace
    stdin_open: true
    tty: true
    volumes:
      - .:/workspace:cached
    ports:
      - "8000:8000"  # Laravel dev server
      - "5173:5173"  # Vite dev server
    depends_on:
      db:
        condition: service_healthy
    environment:
      - APP_ENV=local
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=task_board
      - DB_USERNAME=app_user
      - DB_PASSWORD=app_password
    networks:
      - task-board-network

  # MySQL
  db:
    image: mysql:8.4
    container_name: task-board-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: task_board
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - task-board-network

volumes:
  db-data:

networks:
  task-board-network:
    driver: bridge

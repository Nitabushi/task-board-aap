<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S-005: ユーザー作成/編集モーダル - Task Board モックアップ</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-500 bg-opacity-60 min-h-screen flex items-center justify-center">

  <!-- 背景オーバーレイ -->
  <div class="fixed inset-0 bg-gray-900 bg-opacity-50 z-0"></div>

  <!-- モーダル -->
  <div class="relative z-10 bg-white rounded-xl shadow-2xl w-full max-w-md mx-4">
    <!-- モーダルヘッダー -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200">
      <h2 class="text-lg font-semibold text-gray-800">ユーザー編集</h2>
      <a href="user-management.html" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</a>
    </div>

    <!-- モーダルボディ -->
    <div class="px-6 py-5 space-y-4">

      <!-- 名前 -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          名前 <span class="text-red-500">*</span>
        </label>
        <input
          type="text"
          value="一般花子"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
        />
      </div>

      <!-- メールアドレス -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          メールアドレス <span class="text-red-500">*</span>
        </label>
        <input
          type="email"
          value="user1@example.com"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
        />
        <!-- バリデーションエラー例 -->
        <!-- <p class="text-xs text-red-500 mt-1">このメールアドレスはすでに使用されています。</p> -->
      </div>

      <!-- パスワード -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          パスワード
          <span class="text-gray-400 text-xs font-normal">（空欄の場合は変更しない）</span>
        </label>
        <input
          type="password"
          placeholder="新しいパスワードを入力（8文字以上）"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
        />
      </div>

      <!-- 役割 -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          役割 <span class="text-red-500">*</span>
        </label>
        <select class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
          <option value="admin">管理者（admin）</option>
          <option value="user" selected>一般ユーザー（user）</option>
        </select>
      </div>

    </div>

    <!-- モーダルフッター -->
    <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-gray-200 bg-gray-50 rounded-b-xl">
      <a href="user-management.html">
        <button class="text-sm text-gray-600 hover:text-gray-800 font-medium px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-100 transition-colors">
          キャンセル
        </button>
      </a>
      <button class="text-sm bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-5 py-2 rounded-lg transition-colors">
        保存
      </button>
    </div>
  </div>

  <!-- 注釈 -->
  <p class="fixed bottom-4 left-0 right-0 text-center text-xs text-white opacity-60">
    ※ このページはHTMLモックアップです（動作しません）
  </p>

</body>
</html>

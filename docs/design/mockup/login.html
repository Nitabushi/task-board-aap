<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S-001: ログイン画面 - Task Board モックアップ</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <div class="w-full max-w-sm">
    <!-- ロゴ / タイトル -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-indigo-600">Task Board</h1>
      <p class="text-gray-500 text-sm mt-1">タスク管理アプリ</p>
    </div>

    <!-- ログインカード -->
    <div class="bg-white rounded-xl shadow-md px-8 py-10">
      <h2 class="text-xl font-semibold text-gray-700 mb-6">ログイン</h2>

      <!-- エラーメッセージ（表示例） -->
      <div class="bg-red-50 border border-red-300 text-red-700 text-sm rounded-md px-4 py-3 mb-5">
        メールアドレスまたはパスワードが正しくありません。
      </div>

      <form>
        <!-- メールアドレス -->
        <div class="mb-4">
          <label for="email" class="block text-sm font-medium text-gray-600 mb-1">
            メールアドレス
          </label>
          <input
            id="email"
            type="email"
            placeholder="admin@example.com"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
          />
        </div>

        <!-- パスワード -->
        <div class="mb-6">
          <label for="password" class="block text-sm font-medium text-gray-600 mb-1">
            パスワード
          </label>
          <input
            id="password"
            type="password"
            placeholder="••••••••"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
          />
        </div>

        <!-- ログインボタン -->
        <button
          type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 rounded-lg transition-colors"
        >
          ログイン
        </button>
      </form>
    </div>

    <!-- 注釈 -->
    <p class="text-center text-xs text-gray-400 mt-4">
      ※ このページはHTMLモックアップです（動作しません）
    </p>
  </div>

</body>
</html>

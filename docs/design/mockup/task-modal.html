<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S-003: タスク作成/編集モーダル - Task Board モックアップ</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-500 bg-opacity-60 min-h-screen flex items-center justify-center">

  <!-- 背景（ボード画面のイメージ） -->
  <div class="fixed inset-0 bg-gray-900 bg-opacity-50 z-0"></div>

  <!-- モーダル -->
  <div class="relative z-10 bg-white rounded-xl shadow-2xl w-full max-w-lg mx-4">
    <!-- モーダルヘッダー -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200">
      <h2 class="text-lg font-semibold text-gray-800">タスク編集</h2>
      <a href="task-board.html" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</a>
    </div>

    <!-- モーダルボディ -->
    <div class="px-6 py-5 space-y-4">

      <!-- タイトル -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          タイトル <span class="text-red-500">*</span>
        </label>
        <input
          type="text"
          value="ミーティング資料の準備"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
        />
        <!-- バリデーションエラー例 -->
        <!-- <p class="text-xs text-red-500 mt-1">タイトルは必須です。</p> -->
      </div>

      <!-- 説明文 -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">説明文</label>
        <textarea
          rows="3"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-indigo-400"
        >第3回定例ミーティングのアジェンダと資料を準備する。</textarea>
        <p class="text-xs text-gray-400 text-right mt-0.5">34 / 1000</p>
      </div>

      <!-- ステータス & 優先度（横並び） -->
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            ステータス <span class="text-red-500">*</span>
          </label>
          <select class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
            <option value="todo">TODO</option>
            <option value="in_progress" selected>進行中</option>
            <option value="done">完了</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            優先度 <span class="text-red-500">*</span>
          </label>
          <select class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
            <option value="high">高</option>
            <option value="medium" selected>中</option>
            <option value="low">低</option>
          </select>
        </div>
      </div>

      <!-- 期限日 -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">期限日</label>
        <input
          type="date"
          value="2026-03-11"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
        />
      </div>

    </div>

    <!-- モーダルフッター -->
    <div class="flex items-center justify-between px-6 py-4 border-t border-gray-200 bg-gray-50 rounded-b-xl">
      <!-- 削除ボタン（編集時のみ表示） -->
      <button class="text-sm text-red-500 hover:text-red-700 font-medium">
        削除
      </button>
      <div class="flex gap-3">
        <a href="task-board.html">
          <button class="text-sm text-gray-600 hover:text-gray-800 font-medium px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-100 transition-colors">
            キャンセル
          </button>
        </a>
        <button class="text-sm bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-5 py-2 rounded-lg transition-colors">
          保存
        </button>
      </div>
    </div>
  </div>

  <!-- 注釈 -->
  <p class="fixed bottom-4 left-0 right-0 text-center text-xs text-white opacity-60">
    ※ このページはHTMLモックアップです（動作しません）
  </p>

</body>
</html>
